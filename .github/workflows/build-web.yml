name: Build Web
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --no-web-resources-cdn
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
