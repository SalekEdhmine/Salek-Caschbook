<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cashbook">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta name="theme-color" content="#1976D2">

  <title>cashbook</title>
  <link rel="manifest" href="manifest.json">
  <!-- defer statt blockierendem <head>-Script: darf den Seitenaufbau nie
       verzoegern (v.a. offline, wo dieser Request sonst haengen bleiben
       koennte) - Web Push ist ohnehin nur online nutzbar. -->
  <script src="push_client.js" defer></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1976D2; }
    /* Eigener Ladebildschirm statt leerer weisser Seite, waehrend
       main.dart.js laedt (kann beim allerersten/App-Icon-Start ein paar
       Sekunden dauern) - verschwindet automatisch beim ersten Flutter-Frame. */
    #app-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1976D2;
      transition: opacity 0.25s ease-out;
    }
    #app-splash img {
      width: 160px; height: 160px; border-radius: 32px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      animation: app-splash-pulse 1.6s ease-in-out infinite;
    }
    #app-splash .welcome {
      margin-top: 28px;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      padding: 0 24px;
    }
    #app-splash .spinner {
      margin-top: 24px; width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: app-splash-spin 0.9s linear infinite;
    }
    @keyframes app-splash-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    @keyframes app-splash-spin {
      to { transform: rotate(360deg); }
    }
    #app-splash.app-splash-hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app-splash">
    <img src="icons/Icon-192.png" alt="CashBook">
    <div class="welcome" id="app-splash-text">Willkommen zurück, CashBook</div>
    <div class="spinner"></div>
  </div>
  <script>
    (function () {
      var texts = {
        de: 'Willkommen zurück, CashBook',
        en: 'Welcome back, CashBook',
        ar: 'أهلاً بعودتك، CashBook',
        fr: 'Bon retour, CashBook',
      };
      var lang = (navigator.language || 'de').slice(0, 2);
      var el = document.getElementById('app-splash-text');
      if (el && texts[lang]) el.textContent = texts[lang];
    })();
    // Flutter Web feuert dieses Event nach dem ersten gerenderten Frame -
    // erst dann ist wirklich etwas Sinnvolles zu sehen, das den Splash ersetzen kann.
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('app-splash');
      if (!splash) return;
      splash.classList.add('app-splash-hidden');
      setTimeout(function () { splash.remove(); }, 300);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
